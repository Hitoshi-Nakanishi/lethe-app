[paths]
# Directory for Lethe's settings.json. "~" is expanded.
settings_dir = "~/.lethe"

# Empty values use the operating system defaults.
temp_dir = ""
audio_dir = ""
transcripts_dir = ""
notes_dir = ""
minutes_dir = ""
sessions_dir = ""
datasets_dir = ""

[models]
whisper_live_model = "medium"
whisper_final_model = "large-v3"
whisper_language = "ja"
ollama_url = "http://localhost:11434"
default_llm_model = "llama3.1:8b"
llm_models = ["llama3.1:8b", "qwen2.5:7b", "mistral:7b"]

[filenames]
# MP3 save dialog initial filename. Placeholders: {timestamp}, {meeting_name}.
mp3_template = "{timestamp}_{meeting_name}.mp3"
# Dataset export folder name. Placeholders: {timestamp}, {meeting_name}.
dataset_template = "{timestamp}_{meeting_name}"
meeting_name = "meeting"
timestamp_format = "%Y%m%d_%H%M"

[defaults]
# Initial UI defaults used before a value is saved in settings.json.
mic_capture = true
noise_reduce = false
live = true
llm_model = ""
theme = "midnight"
dark_mode = true
language = "en"
font_size = 11
