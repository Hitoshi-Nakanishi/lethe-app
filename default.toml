[paths]
# Directory for Lethe's settings.json. "~" is expanded.
settings_dir = "~/.lethe"

# Empty values use the operating system defaults.
temp_dir = ""
audio_dir = ""
transcripts_dir = ""
notes_dir = ""
minutes_dir = ""
sessions_dir = ""

[models]
whisper_live_model = "medium"
whisper_final_model = "large-v3"
whisper_language = "ja"
ollama_url = "http://localhost:11434"
default_llm_model = "llama3.1:8b"
llm_models = ["llama3.1:8b", "qwen2.5:7b", "mistral:7b"]

[defaults]
# Initial UI defaults used before a value is saved in settings.json.
live = true
