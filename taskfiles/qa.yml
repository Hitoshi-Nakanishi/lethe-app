version: '3'

tasks:
  default:
    desc: Run Ruff formatting, Ruff checks, ty checks, and pytest
    cmds:
      - task: format
      - task: check
      - task: typecheck
      - task: test

  format:
    desc: Run Ruff formatter
    cmds:
      - uv run --no-sync ruff format .

  check:
    desc: Run Ruff lint checks
    cmds:
      - uv run --no-sync ruff check .

  fix:
    desc: Run Ruff lint fixes
    cmds:
      - uv run --no-sync ruff check . --fix

  sort-imports:
    desc: Sort imports with Ruff
    cmds:
      - uv run --no-sync ruff check --select I --fix .

  typecheck:
    desc: Run ty type checks
    cmds:
      - uv run --no-sync ty check

  test:
    desc: Run pytest
    cmds:
      - uv run --no-sync pytest -q
