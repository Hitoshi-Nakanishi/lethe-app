version: '3'

tasks:
  default:
    cmds:
      - task: format
      - task: check
      - task: typecheck
      - task: test

  format:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync ruff format .

  check:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync ruff check .

  fix:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync ruff check . --fix

  sort-imports:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync ruff check --select I --fix .

  typecheck:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync ty check

  test:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync pytest -q
