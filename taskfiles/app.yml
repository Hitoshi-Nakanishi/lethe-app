version: '3'

tasks:
  run:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync lethe {{.CLI_ARGS}}

  model-list:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/model_tasks.py list

  llm-list:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/ollama_models.py list

  llm:
    summary: |
      Usage:
        task llm
        task llm -- llama3.1:8b qwen2.5:7b
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/ollama_models.py pull {{.CLI_ARGS}}

  download-models:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/model_tasks.py download

  download-whisper-models:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/download_models.py {{.CLI_ARGS}}

  download-llm-model:
    summary: |
      Usage:
        task download-llm-model
        task download-llm-model -- llama3.1:8b qwen2.5:7b
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/ollama_models.py pull {{.CLI_ARGS}}

  recorder:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python -m recorder {{.CLI_ARGS}}

  devices:
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python -m recorder devices
