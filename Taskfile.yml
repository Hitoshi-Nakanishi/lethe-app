version: '3'

includes:
  qa:
    taskfile: ./taskfiles/qa.yml
    aliases: [py]
  app:
    taskfile: ./taskfiles/app.yml

tasks:
  default:
    desc: Run formatting, linting, type checks, and tests
    summary: |
      Root entrypoint for the standard repository checks.
      The implementation lives under qa:default so the root Taskfile stays small.
    cmds:
      - task: qa:default

  format:
    desc: Format Python files with Ruff
    cmds:
      - task: qa:format

  check:
    desc: Run Ruff lint checks
    cmds:
      - task: qa:check

  fix:
    desc: Run Ruff lint fixes
    cmds:
      - task: qa:fix

  typecheck:
    desc: Run ty type checks
    cmds:
      - task: qa:typecheck

  test:
    desc: Run the Python test suite
    cmds:
      - task: qa:test

  run:
    desc: Run the Lethe desktop app
    cmds:
      - task: app:run

  model-list:
    desc: List configured Whisper and Ollama models (medium, large-v3, llama3.1:8b, qwen2.5:7b, mistral:7b)
    cmds:
      - task: app:model-list

  llm-list:
    desc: List configured Ollama LLM models
    cmds:
      - task: app:llm-list

  llm:
    desc: Download configured Ollama LLM models, or named models passed after --
    summary: |
      Usage:
        task llm
        task llm -- llama3.1:8b qwen2.5:7b
    cmds:
      - task: app:llm

  download-models:
    desc: Download configured Whisper and Ollama models (medium, large-v3, llama3.1:8b, qwen2.5:7b, mistral:7b)
    cmds:
      - task: app:download-models

  download-llm-models:
    desc: Download configured Ollama LLM models
    cmds:
      - task: app:llm

  download-whisper-models:
    desc: Download configured Whisper speech models (medium, large-v3)
    cmds:
      - task: app:download-whisper-models

  download-llm-model:
    desc: Download configured Ollama LLM models, or named models passed after --
    summary: |
      Usage:
        task download-llm-model
        task download-llm-model -- llama3.1:8b qwen2.5:7b
    cmds:
      - task: app:download-llm-model

  setup:
    desc: Sync the uv project environment
    cmds:
      - task: sync

  sync:
    desc: Sync the uv project environment
    cmds:
      - python src/scripts/uv_bootstrap.py sync --dev

  list:
    desc: Show public task commands
    summary: |
      Public tasks are grouped by namespace:
      - qa:
      - app:
    cmds:
      - task --list
