version: '3'

includes:
  qa:
    taskfile: ./taskfiles/qa.yml
    aliases: [py]
  app:
    taskfile: ./taskfiles/app.yml

tasks:
  default:
    desc: Run formatting, linting, type checks, and tests
    summary: |
      Standard repository check:
        task
        task default
    cmds:
      - task: qa:default

  format:
    cmds:
      - task: qa:format

  check:
    cmds:
      - task: qa:check

  fix:
    cmds:
      - task: qa:fix

  typecheck:
    cmds:
      - task: qa:typecheck

  test:
    cmds:
      - task: qa:test

  run:
    desc: Run the Lethe desktop app
    cmds:
      - task: app:run

  model-list:
    cmds:
      - task: app:model-list

  llm-list:
    cmds:
      - task: app:llm-list

  models:
    desc: List/download Whisper and Ollama models
    summary: |
      Usage:
        task models
        task models -- download
        task models -- whisper medium large-v3
        task models -- llm llama3.1:8b qwen2.5:7b
    cmds:
      - python src/scripts/uv_bootstrap.py run --no-sync python src/scripts/model_tasks.py {{.CLI_ARGS}}

  llm:
    desc: Download configured Ollama LLM models, or named models passed after --
    summary: |
      Usage:
        task llm
        task llm -- llama3.1:8b qwen2.5:7b
    cmds:
      - task: app:llm

  download-models:
    cmds:
      - task: app:download-models

  download-llm-models:
    cmds:
      - task: app:llm

  download-whisper-models:
    cmds:
      - task: app:download-whisper-models

  download-llm-model:
    summary: |
      Usage:
        task download-llm-model
        task download-llm-model -- llama3.1:8b qwen2.5:7b
    cmds:
      - task: app:download-llm-model

  setup:
    desc: Sync the uv project environment
    cmds:
      - task: sync

  sync:
    cmds:
      - python src/scripts/uv_bootstrap.py sync --dev

  list:
    desc: Show public task commands
    summary: |
      Shows the small public command set. Older compatibility tasks and
      namespaced implementation tasks are intentionally hidden from the list.
    cmds:
      - task --list
